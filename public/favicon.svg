<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Central sweeping bezier swirl mimicking the beautiful curved leaf diagonal -->
    <path id="swoop" d="M 5 20 C 35 10, 65 45, 95 80 C 65 90, 35 55, 5 20 Z" />
    
    <!-- An elegant expanded cut-mask algorithm ensuring uniform curving gaps between the shapes -->
    <mask id="cut">
      <rect width="100" height="100" fill="white" />
      <use href="#swoop" fill="black" stroke="black" stroke-width="8" stroke-linejoin="round" />
    </mask>

    <g id="logo-body">
      <!-- Left Stem (Top plunges deep upward into the mask zone to be sheared by the smooth curve) -->
      <polygon points="15,80 35,80 35,25 15,5" mask="url(#cut)" />
      
      <!-- Right Stem (Bottom plunges deep downward into the mask zone to be sheared by the smooth curve) -->
      <polygon points="65,20 85,20 85,95 65,75" mask="url(#cut)" />
      
      <!-- The main swooping curve drops right in the middle -->
      <use href="#swoop" />
    </g>

    <style>
      /* Light Mode (Browser default) */
      .shadow { fill: #d1d5db; }
      .foreground { fill: #111827; }

      /* Dark Mode */
      @media (prefers-color-scheme: dark) {
        .shadow { fill: #000000; }
        .foreground { fill: #f9fafb; }
      }
    </style>
  </defs>

  <!-- Crisp structural bevel shadow pushing 3px right and 4px down for a drastically heavier, darker pop -->
  <use href="#logo-body" class="shadow" transform="translate(3, 4)" />
  
  <!-- Beautiful silver focal geometries overlayed -->
  <use href="#logo-body" class="foreground" />
</svg>
